name: Ranní report

# Spouští se z Hostpoint cronu (trigger_report.php) — spolehlivě 2× denně, po–pá.
# GitHubí vlastní rozvrh je vypnutý, aby se běhy nezdvojovaly (úspora nákladů).
on:
  workflow_dispatch: {}

permissions:
  contents: write          # aby workflow mohl commitnout nový report

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPORT_MODEL: ${{ vars.REPORT_MODEL || 'claude-opus-4-8' }}
          REPORT_NUM_STOCKS: ${{ vars.REPORT_NUM_STOCKS || '10' }}
        run: python generate_report.py

      - name: Commit & push report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --staged --quiet; then
            echo "Žádná změna reportu."; exit 0
          fi
          git commit -m "Ranní report $(date -u +%Y-%m-%d_%H:%M)"
          # Robustní push: když se remote mezitím pohnul (souběžný běh / ruční commit),
          # převezmi jeho stav a znovu aplikuj náš report (nejnovější report vítězí).
          for i in 1 2 3 4 5; do
            if git push; then echo "pushnuto"; exit 0; fi
            echo "push odmítnut — srovnávám s remote a zkouším znovu (pokus $i)"
            git fetch origin main
            git reset --soft origin/main
            git add data/*.json
            if git diff --staged --quiet; then echo "nic k pushnutí po srovnání"; exit 0; fi
            git commit -m "Ranní report $(date -u +%Y-%m-%d_%H:%M)"
            sleep $((i * 3))
          done
          echo "push se nepovedl ani po 5 pokusech"; exit 1
